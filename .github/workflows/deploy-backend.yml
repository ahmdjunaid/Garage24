name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/garage-backend ./backend

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/garage-backend

      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1.0.0 
        with: 
          host: ${{ secrets.EC2_HOST }} 
          username: ${{ secrets.EC2_USER }} 
          key: ${{ secrets.EC2_SSH_KEY }} 
          script: |
            docker system prune -a -f
            docker pull ${{ secrets.DOCKER_USERNAME }}/garage-backend
            docker stop garage-backend || true
            docker rm garage-backend || true
            docker run -d --name garage-backend --env-file /home/ubuntu/.env -p 3000:3000 --restart always ${{ secrets.DOCKER_USERNAME }}/garage-backend